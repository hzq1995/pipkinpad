<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login · PipkinPad</title><style>
:root{color-scheme:light}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(145deg,#f8f4fb,#ffeef5);color:#493d57;font:14px system-ui,sans-serif}.card{width:min(390px,calc(100vw - 32px));padding:32px;border:1px solid #e8ddeb;border-radius:22px;background:#fffafd;box-shadow:0 24px 70px #543b6520}.mark{display:grid;place-items:center;width:46px;height:46px;border-radius:14px;background:#ffe1ee;color:#8058a8;font-size:24px}h1{margin:18px 0 8px;font-size:24px}p{margin:0 0 22px;color:#8d8099}label{display:block;margin-bottom:7px;font-weight:700}input{width:100%;padding:12px;border:1px solid #e8ddeb;border-radius:10px;outline:none;font:inherit}input:focus{border-color:#a276cf;box-shadow:0 0 0 3px #a276cf20}button{width:100%;margin-top:14px;padding:12px;border:0;border-radius:10px;background:#a276cf;color:white;font:700 14px system-ui;cursor:pointer}button:disabled{opacity:.6}.error{min-height:20px;margin-top:10px;color:#b23c62;font-size:12px}
</style></head><body><form class="card" id="login"><div class="mark">✦</div><h1>Welcome Back</h1><p>Enter your password to access the PipkinPad workbench. You'll stay logged in for 30 days.</p><label for="password">Password</label><input id="password" type="password" autocomplete="current-password" autofocus required><button>Sign In</button><div class="error" id="error" role="alert"></div></form><script>
document.getElementById('login').addEventListener('submit',async(e)=>{e.preventDefault();const button=e.currentTarget.querySelector('button'),error=document.getElementById('error');button.disabled=true;error.textContent='';try{const response=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:document.getElementById('password').value})});if(!response.ok)throw new Error('Incorrect password. Please try again.');location.replace('/')}catch(err){error.textContent=err.message;button.disabled=false}});
</script></body></html>
